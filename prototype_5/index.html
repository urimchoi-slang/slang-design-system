<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Inbox — Slang</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ── TOKENS ─────────────────────────────────────────────────── */
    :root {
      --canvas:        #F5F3FF;
      --sidebar-bg:    #0F0B1A;
      --sidebar-w:     220px;
      --sidebar-collapsed: 60px;
      --card:          #FFFFFF;
      --card-radius:   16px;
      --card-shadow:   0 1px 2px rgba(80,50,140,0.05), 0 4px 14px rgba(80,50,140,0.07), 0 12px 32px rgba(80,50,140,0.05);

      --pink:          #E879F9;
      --violet:        #A78BFA;
      --blue:          #7DC1F7;
      --grad:          linear-gradient(135deg, #E879F9 0%, #A78BFA 50%, #7DC1F7 100%);

      --accent:        #A78BFA;
      --accent-hover:  #8B6FF0;
      --accent-light:  #F0EEFF;
      --accent-dim:    #C4B5FD;

      --red:           #DC2626;
      --red-light:     #FEE2E2;
      --red-mid:       #FCA5A5;
      --green:         #16A34A;
      --green-light:   #DCFCE7;
      --amber:         #D97706;
      --amber-light:   #FEF3C7;
      --blue-pill:     #2563EB;
      --blue-pill-bg:  #DBEAFE;
      --indigo:        #4338CA;
      --indigo-bg:     #EEF2FF;

      --t1:   #1A1030;
      --t2:   #6B5B8A;
      --t3:   #A094BA;
      --st1:  #E8D8FF;
      --st2:  #9080B0;
      --st3:  #503870;
      --b1:   #EAE4FA;
      --b2:   #D6CCF0;

      --r-sm:   5px;
      --r-md:   8px;
      --r-lg:   12px;
      --r-xl:   16px;
      --r-pill: 100px;
      --ease-std:    cubic-bezier(0.4, 0, 0.2, 1);
      --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    /* ── GLOBAL ─────────────────────────────────────────────────── */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--canvas);
      color: var(--t1);
      overflow: hidden;
      height: 100vh;
    }

    /* ── LAYOUT ─────────────────────────────────────────────────── */
    .app {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── SIDEBAR ────────────────────────────────────────────────── */
    .sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background: var(--sidebar-bg);
      display: flex;
      flex-direction: column;
      border-right: 1px solid rgba(255,255,255,0.06);
      transition: width 0.28s var(--ease-std), min-width 0.28s var(--ease-std);
      overflow: hidden;
      position: relative;
      z-index: 10;
    }

    .sidebar.collapsed {
      width: var(--sidebar-collapsed);
      min-width: var(--sidebar-collapsed);
    }

    /* Logo area */
    .sidebar-logo {
      height: 64px;
      display: flex;
      align-items: center;
      padding: 0 18px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
      overflow: hidden;
      white-space: nowrap;
    }

    .logo-full {
      font-size: 22px;
      font-weight: 800;
      background: var(--grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
      opacity: 1;
      transition: opacity 0.15s var(--ease-std);
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      border-radius: 9px;
      background: var(--grad);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 800;
      color: white;
      flex-shrink: 0;
      opacity: 0;
      position: absolute;
      left: 14px;
      transition: opacity 0.15s var(--ease-std);
    }

    .sidebar.collapsed .logo-full { opacity: 0; pointer-events: none; }
    .sidebar.collapsed .logo-icon { opacity: 1; }

    /* Nav */
    .nav {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 12px 8px;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .nav::-webkit-scrollbar { display: none; }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 10px;
      border-radius: var(--r-lg);
      color: var(--st2);
      cursor: pointer;
      transition: background 0.15s var(--ease-std), color 0.15s var(--ease-std);
      font-size: 13.5px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      position: relative;
    }

    .nav-item:hover {
      background: rgba(255,255,255,0.07);
      color: var(--st1);
    }

    .nav-item.active {
      background: rgba(167,139,250,0.18);
      color: var(--violet);
    }

    .nav-item.active .nav-icon {
      color: var(--violet);
    }

    .nav-icon {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .nav-icon svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .nav-label {
      opacity: 1;
      transition: opacity 0.15s var(--ease-std);
    }

    .sidebar.collapsed .nav-label { opacity: 0; }

    .nav-badge {
      margin-left: auto;
      background: var(--pink);
      color: white;
      font-size: 10px;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: var(--r-pill);
      flex-shrink: 0;
      transition: opacity 0.15s var(--ease-std);
    }

    .sidebar.collapsed .nav-badge { opacity: 0; }

    /* Sidebar toggle button */
    .sidebar-toggle {
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 12px;
      border-top: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
    }

    .sidebar.collapsed .sidebar-toggle {
      justify-content: center;
      padding: 0;
    }

    .toggle-btn {
      width: 28px;
      height: 28px;
      border-radius: var(--r-md);
      border: none;
      background: rgba(255,255,255,0.08);
      color: var(--st2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
      flex-shrink: 0;
    }

    .toggle-btn:hover {
      background: rgba(255,255,255,0.15);
      color: var(--st1);
    }

    .toggle-btn svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: transform 0.28s var(--ease-std);
    }

    .sidebar.collapsed .toggle-btn svg {
      transform: rotate(180deg);
    }

    /* User profile */
    .sidebar-user {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 10px;
      margin: 0 8px 8px;
      border-radius: var(--r-lg);
      cursor: pointer;
      transition: background 0.15s;
      overflow: hidden;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .sidebar-user:hover { background: rgba(255,255,255,0.07); }

    .user-avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: var(--grad);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .user-info {
      overflow: hidden;
      transition: opacity 0.15s;
    }

    .sidebar.collapsed .user-info { opacity: 0; }

    .user-name {
      font-size: 13px;
      font-weight: 600;
      color: white;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .user-email {
      font-size: 11px;
      color: var(--st2);
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── MAIN AREA ──────────────────────────────────────────────── */
    .main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ── LIST PANEL ─────────────────────────────────────────────── */
    .list-panel {
      display: flex;
      flex-direction: column;
      background: var(--canvas);
      border-right: 1px solid var(--b2);
      transition: width 0.3s var(--ease-std);
      overflow: hidden;
      flex-shrink: 0;
      width: 100%;
    }

    .list-panel.detail-open {
      width: 44%;
      min-width: 340px;
    }

    /* Topbar */
    .topbar {
      height: 64px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 20px;
      background: white;
      border-bottom: 1px solid var(--b2);
      flex-shrink: 0;
    }

    .topbar-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--t1);
      flex: 1;
    }

    .search-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--b1);
      border-radius: var(--r-lg);
      padding: 8px 12px;
      width: 220px;
    }

    .search-wrap svg {
      width: 15px;
      height: 15px;
      stroke: var(--t3);
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }

    .search-wrap input {
      border: none;
      background: transparent;
      outline: none;
      font-size: 13px;
      color: var(--t1);
      font-family: inherit;
      width: 100%;
    }

    .search-wrap input::placeholder { color: var(--t3); }

    .filter-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      background: var(--b1);
      border: none;
      border-radius: var(--r-lg);
      font-size: 13px;
      font-weight: 600;
      color: var(--t2);
      cursor: pointer;
      transition: background 0.15s;
      font-family: inherit;
    }

    .filter-btn:hover { background: var(--b2); }

    .filter-btn svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* Section header */
    .section-header {
      padding: 16px 20px 8px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--t3);
    }

    /* List scroll area */
    .list-scroll {
      flex: 1;
      overflow-y: auto;
    }

    .list-scroll::-webkit-scrollbar { width: 4px; }
    .list-scroll::-webkit-scrollbar-track { background: transparent; }
    .list-scroll::-webkit-scrollbar-thumb { background: var(--b2); border-radius: 4px; }

    /* Row items */
    .inbox-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      cursor: pointer;
      transition: background 0.12s;
      border-bottom: 1px solid var(--b1);
      position: relative;
    }

    .inbox-row:hover { background: rgba(167,139,250,0.06); }

    .inbox-row.active {
      background: var(--accent-light);
      border-bottom-color: rgba(167,139,250,0.15);
    }

    .inbox-row.active::after {
      content: '';
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: var(--accent);
      border-radius: 2px 0 0 2px;
    }

    .inbox-row.unread .row-name { font-weight: 700; }
    .inbox-row.unread .row-preview { color: var(--t2); }

    .row-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
    }

    .row-body {
      flex: 1;
      min-width: 0;
    }

    .row-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 3px;
    }

    .row-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--t1);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .row-time {
      font-size: 11px;
      color: var(--t3);
      flex-shrink: 0;
      margin-left: 8px;
      font-family: 'DM Mono', monospace;
    }

    .row-preview {
      font-size: 12.5px;
      color: var(--t3);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-bottom: 5px;
    }

    .row-meta {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: var(--r-pill);
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
    }

    .badge-urgent    { background: var(--red-light);    color: var(--red);      }
    .badge-important { background: var(--amber-light);  color: var(--amber);    }
    .badge-resolved  { background: var(--green-light);  color: var(--green);    }
    .badge-pending   { background: var(--indigo-bg);    color: var(--indigo);   }
    .badge-new       { background: #FDF4FF;              color: var(--pink);     }

    .unread-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--pink);
      flex-shrink: 0;
    }

    /* ── DETAIL PANE ────────────────────────────────────────────── */
    .detail-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: white;
      transform: translateX(100%);
      opacity: 0;
      transition: transform 0.3s var(--ease-std), opacity 0.25s var(--ease-std);
      overflow: hidden;
      pointer-events: none;
    }

    .detail-pane.open {
      transform: translateX(0);
      opacity: 1;
      pointer-events: auto;
    }

    /* Detail header */
    .detail-header {
      padding: 20px 24px 0;
      background: white;
      border-bottom: 1px solid var(--b1);
      flex-shrink: 0;
    }

    .detail-header-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .detail-contact {
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }

    .detail-avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .detail-name-block {}

    .detail-name {
      font-size: 22px;
      font-weight: 800;
      color: var(--t1);
      letter-spacing: -0.3px;
      line-height: 1.2;
      margin-bottom: 6px;
    }

    .detail-contact-info {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .contact-info-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--t2);
    }

    .contact-info-row svg {
      width: 13px;
      height: 13px;
      stroke: var(--t3);
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }

    .detail-close {
      width: 32px;
      height: 32px;
      border-radius: var(--r-md);
      border: none;
      background: var(--b1);
      color: var(--t2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
      flex-shrink: 0;
    }

    .detail-close:hover {
      background: var(--b2);
      color: var(--t1);
    }

    .detail-close svg {
      width: 15px;
      height: 15px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .detail-tabs {
      display: flex;
      gap: 0;
      margin-top: 14px;
    }

    .detail-tab {
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      color: var(--t3);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }

    .detail-tab:hover { color: var(--t2); }

    .detail-tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .detail-meta-pills {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 14px;
      margin-top: 4px;
    }

    /* Detail body */
    .detail-body {
      flex: 1;
      overflow-y: auto;
    }

    .detail-body::-webkit-scrollbar { width: 4px; }
    .detail-body::-webkit-scrollbar-track { background: transparent; }
    .detail-body::-webkit-scrollbar-thumb { background: var(--b2); border-radius: 4px; }

    /* ── TRANSCRIPT ─────────────────────────────────────────────── */
    .transcript {
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .transcript-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--t3);
      text-align: center;
      position: relative;
    }

    .transcript-label::before,
    .transcript-label::after {
      content: '';
      position: absolute;
      top: 50%;
      width: calc(50% - 70px);
      height: 1px;
      background: var(--b2);
    }

    .transcript-label::before { left: 0; }
    .transcript-label::after  { right: 0; }

    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }

    /* Customer/caller messages: LEFT aligned */
    .msg-row.caller {
      flex-direction: row;
      justify-content: flex-start;
    }

    /* AI/agent messages: RIGHT aligned */
    .msg-row.agent {
      flex-direction: row-reverse;
      justify-content: flex-start;
    }

    .msg-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
      margin-bottom: 2px;
    }

    .msg-avatar.caller-av {
      background: var(--b2);
      color: var(--t2);
    }

    .msg-avatar.agent-av {
      background: var(--grad);
      color: white;
    }

    .msg-bubble-wrap {
      display: flex;
      flex-direction: column;
      max-width: 72%;
    }

    .msg-row.caller .msg-bubble-wrap { align-items: flex-start; }
    .msg-row.agent  .msg-bubble-wrap { align-items: flex-end; }

    .msg-bubble {
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 13.5px;
      line-height: 1.55;
    }

    .caller .msg-bubble {
      background: var(--b1);
      color: var(--t1);
      border-bottom-left-radius: 4px;
    }

    .agent .msg-bubble {
      background: var(--accent);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .msg-time {
      font-size: 10.5px;
      color: var(--t3);
      margin-top: 4px;
      font-family: 'DM Mono', monospace;
    }

    /* ── NOTES / CRM panel ──────────────────────────────────────── */
    .detail-info-section {
      padding: 20px 24px;
      border-top: 1px solid var(--b1);
    }

    .info-section-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--t3);
      margin-bottom: 12px;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .info-item {}

    .info-label {
      font-size: 11px;
      color: var(--t3);
      margin-bottom: 2px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .info-value {
      font-size: 13.5px;
      color: var(--t1);
      font-weight: 500;
    }

    /* ── EMPTY STATE ────────────────────────────────────────────── */
    .empty-detail {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--t3);
      padding: 40px;
      text-align: center;
    }

    .empty-detail svg {
      width: 48px;
      height: 48px;
      stroke: var(--b2);
      fill: none;
      stroke-width: 1.5;
    }

    .empty-detail h3 {
      font-size: 16px;
      font-weight: 700;
      color: var(--t2);
    }

    .empty-detail p {
      font-size: 13px;
      color: var(--t3);
      max-width: 260px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
<div class="app">

  <!-- ── SIDEBAR ─────────────────────────────────────────────────── -->
  <aside class="sidebar" id="sidebar">

    <div class="sidebar-logo">
      <div class="logo-full">slang</div>
      <div class="logo-icon">S</div>
    </div>

    <nav class="nav">
      <div class="nav-item active">
        <span class="nav-icon">

/* ── RENDER ─────────────────────────────────────────────────────────── */
let activeId = null;

function renderList(items) {
  const list = document.getElementById('inboxList');
  list.innerHTML = items.map(c => `
    <div class="inbox-row ${c.unread ? 'unread' : ''} ${activeId === c.id ? 'active' : ''}"
         data-id="${c.id}" onclick="openDetail(${c.id})">
      <div class="row-avatar" style="background:${c.color}">${c.initials}</div>
      <div class="row-body">
        <div class="row-top">
          <span class="row-name">${c.name}</span>
          <span class="row-time">${c.time}</span>
        </div>
        <div class="row-preview">${c.preview}</div>
        <div class="row-meta">
          ${c.unread ? '<div class="unread-dot"></div>' : ''}
          <span class="badge badge-${c.badge}">${c.badgeLabel}</span>
          ${c.tags.map(t => `<span class="badge" style="background:var(--b1);color:var(--t2)">${t}</span>`).join('')}
        </div>
      </div>
    </div>
  `).join('');
}

function openDetail(id) {
  activeId = id;
  const c = conversations.find(x => x.id === id);
  if (!c) return;

  // Update active row styles
  document.querySelectorAll('.inbox-row').forEach(r => {
    r.classList.toggle('active', parseInt(r.dataset.id) === id);
  });

  // Open list-panel narrow mode
  document.getElementById('listPanel').classList.add('detail-open');

  // Build detail header
  document.getElementById('detailHeader').innerHTML = `
    <div class="detail-header-top">
      <div class="detail-contact">
        <div class="detail-avatar" style="background:${c.color}">${c.initials}</div>
        <div class="detail-name-block">
          <div class="detail-name">${c.name}</div>
          <div class="detail-contact-info">
            <div class="contact-info-row">
              <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 11a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 0h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9a16 16 0 0 0 6.86 6.86l1.36-1.16a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
              ${c.phone}
            </div>
            <div class="contact-info-row">
              <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
              ${c.email}
            </div>
          </div>
        </div>
      </div>
      <button class="detail-close" onclick="closeDetail()">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="detail-meta-pills">
      <span class="badge badge-${c.badge}">${c.badgeLabel}</span>
      ${c.tags.map(t => `<span class="badge" style="background:var(--b1);color:var(--t2)">${t}</span>`).join('')}
      <span class="badge" style="background:var(--indigo-bg);color:var(--indigo)">${c.restaurant}</span>
      <span class="badge" style="background:var(--b1);color:var(--t3);font-family:'DM Mono',monospace">⏱ ${c.duration}</span>
    </div>
    <div class="detail-tabs">
      <div class="detail-tab active">Transcript</div>
      <div class="detail-tab">Notes</div>
      <div class="detail-tab">Contact Info</div>
    </div>
  `;

  // Build transcript
  const bubbles = c.transcript.map(m => `
    <div class="msg-row ${m.role}">
      <div class="msg-avatar ${m.role === 'caller' ? 'caller-av' : 'agent-av'}">
        ${m.role === 'caller' ? c.initials : 'AI'}
      </div>
      <div class="msg-bubble-wrap">
        <div class="msg-bubble">${m.text}</div>
        <div class="msg-time">${m.time}</div>
      </div>
    </div>
  `).join('');

  document.getElementById('detailBody').innerHTML = `
    <div class="transcript">
      <div class="transcript-label">Call Transcript · ${c.time}</div>
      ${bubbles}
    </div>
    <div class="detail-info-section">
      <div class="info-section-title">Call Details</div>
      <div class="info-grid">
        <div class="info-item">
          <div class="info-label">Restaurant</div>
          <div class="info-value">${c.restaurant}</div>
        </div>
        <div class="info-item">
          <div class="info-label">Duration</div>
          <div class="info-value">${c.duration}</div>
        </div>
        <div class="info-item">
          <div class="info-label">Status</div>
          <div class="info-value">${c.badgeLabel}</div>
        </div>
        <div class="info-item">
          <div class="info-label">Called</div>
          <div class="info-value">${c.time}</div>
        </div>
      </div>
    </div>
  `;

  // Open pane with animation
  requestAnimationFrame(() => {
    document.getElementById('detailPane').classList.add('open');
  });

  // Tab switching
  document.querySelectorAll('.detail-tab').forEach((tab, i) => {
    tab.onclick = () => {
      document.querySelectorAll('.detail-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
    };
  });
}

function closeDetail() {
  activeId = null;
  document.getElementById('detailPane').classList.remove('open');
  document.getElementById('listPanel').classList.remove('detail-open');
  document.querySelectorAll('.inbox-row').forEach(r => r.classList.remove('active'));
}

/* ── SIDEBAR TOGGLE ─────────────────────────────────────────────────── */
document.getElementById('sidebarToggle').addEventListener('click', () => {
  document.getElementById('sidebar').classList.toggle('collapsed');
});

/* ── SEARCH ─────────────────────────────────────────────────────────── */
document.getElementById('searchInput').addEventListener('input', e => {
  const q = e.target.value.toLowerCase();
  const filtered = q
    ? conversations.filter(c =>
        c.name.toLowerCase().includes(q) ||
        c.preview.toLowerCase().includes(q) ||
        c.phone.includes(q)
      )
    : conversations;
  renderList(filtered);
});

/* ── INIT ────────────────────────────────────────────────────────────── */
renderList(conversations);
</script>
