<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Inbox — Slang</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Sidebar */
      --sidebar-bg:         #111827;
      --sidebar-w:          210px;
      --sidebar-border:     rgba(255,255,255,0.06);
      --sidebar-text:       #9CA3AF;
      --sidebar-text-hover: #D1D5DB;
      --sidebar-active-bg:  rgba(255,255,255,0.09);

      /* Canvas */
      --canvas:      #F0F2F8;
      --card:        #FFFFFF;
      --card-radius: 10px;

      /* Brand — blue gradient, no purple */
      --brand-a:    #38BDF8;
      --brand-b:    #2563EB;
      --brand-grad: linear-gradient(135deg, #38BDF8 0%, #2563EB 100%);

      /* Modality avatar colors */
      --mod-phone-bg:  #DBEAFE; --mod-phone-fg:  #1D4ED8;
      --mod-sms-bg:    #D1FAE5; --mod-sms-fg:    #065F46;
      --mod-email-bg:  #FEF3C7; --mod-email-fg:  #92400E;
      --mod-chat-bg:   #ECFEFF; --mod-chat-fg:   #0891B2;

      /* Accent */
      --accent:       #2563EB;
      --accent-hover: #1D4ED8;
      --accent-light: #EFF6FF;
      --accent-dim:   #BFDBFE;

        /* Revenue pill colors */
      --rose:        #E11D48;
      --rose-light:  #FFF1F2;
      --green:       #16A34A;
      --green-light: #F0FDF4;
      --cyan:        #0891B2;
      --cyan-light:  #ECFEFF;

      /* Text */
      --t1: #111827;
      --t2: #374151;
      --t3: #6B7280;
      --t4: #9CA3AF;

      /* Borders */
      --b1: #F9FAFB;
      --b2: #F3F4F6;
      --b3: #E5E7EB;
      --b4: #D1D5DB;

      --r-sm:   4px;
      --r-md:   8px;
      --r-lg:   10px;
      --r-pill: 100px;
      --ease:   cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--canvas);
      color: var(--t1);
      height: 100vh;
      overflow: hidden;
    }

    .app { display: flex; height: 100vh; }

    /* ══════════════ SIDEBAR ══════════════ */
    .sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background: var(--sidebar-bg);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .sidebar-logo {
      padding: 20px 16px 12px;
      flex-shrink: 0;
    }

    .logo-img {
      height: 26px;
      width: auto;
      display: block;
    }

    .location-selector {
      margin: 0 8px 6px;
      padding: 8px 10px;
      border-radius: var(--r-lg);
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: background 0.15s;
      color: var(--sidebar-text-hover);
      font-size: 13px;
      font-weight: 600;
      border: 1px solid var(--sidebar-border);
    }

    .location-selector:hover { background: rgba(255,255,255,0.06); }

    .location-selector svg {
      width: 15px; height: 15px;
      stroke: currentColor; fill: none;
      stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
      flex-shrink: 0;
    }

    .location-name { flex: 1; }
    .location-chevron { opacity: 0.45; flex-shrink: 0; }

    .nav {
      flex: 1;
      padding: 4px 8px;
      display: flex;
      flex-direction: column;
      gap: 1px;
      overflow-y: auto;
    }
    .nav::-webkit-scrollbar { display: none; }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 10px;
      border-radius: var(--r-md);
      color: var(--sidebar-text);
      cursor: pointer;
      transition: background 0.13s, color 0.13s;
      font-size: 13.5px;
      font-weight: 500;
      white-space: nowrap;
    }
    .nav-item:hover { background: rgba(255,255,255,0.06); color: var(--sidebar-text-hover); }
    .nav-item.active { background: var(--sidebar-active-bg); color: #F9FAFB; font-weight: 600; }

    .nav-icon {
      width: 18px; height: 18px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .nav-icon svg {
      width: 16px; height: 16px;
      stroke: currentColor; fill: none;
      stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round;
    }
    .nav-label { flex: 1; }
    .nav-badge {
      background: #EF4444;
      color: white;
      font-size: 10px; font-weight: 700;
      padding: 1px 5px;
      border-radius: var(--r-pill);
      min-width: 18px; text-align: center;
    }

    .sidebar-bottom {
      padding: 8px;
      border-top: 1px solid var(--sidebar-border);
      flex-shrink: 0;
    }

    .whats-new-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 10px;
      border-radius: var(--r-md);
      color: var(--sidebar-text);
      cursor: pointer;
      transition: background 0.13s, color 0.13s;
      font-size: 13.5px; font-weight: 500;
      margin-bottom: 2px;
    }
    .whats-new-item:hover { background: rgba(255,255,255,0.06); color: var(--sidebar-text-hover); }

    .sidebar-user {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 10px;
      border-radius: var(--r-md);
      cursor: pointer;
      transition: background 0.13s;
    }
    .sidebar-user:hover { background: rgba(255,255,255,0.06); }

    .user-avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--brand-grad);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: white;
      flex-shrink: 0;
    }
    .user-name { flex: 1; font-size: 13px; font-weight: 600; color: var(--sidebar-text-hover); }
    .user-more {
      width: 22px; height: 22px;
      display: flex; align-items: center; justify-content: center;
      color: var(--sidebar-text);
      border-radius: var(--r-sm);
      transition: background 0.13s;
    }
    .user-more:hover { background: rgba(255,255,255,0.1); color: var(--sidebar-text-hover); }
    .user-more svg {
      width: 14px; height: 14px;
      stroke: currentColor; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }

    /* ══════════════ MAIN ══════════════ */
    .main { flex: 1; display: flex; overflow: hidden; }

    /* ══════════════ LIST PANEL ══════════════ */
    .list-panel {
      width: 100%;
      display: flex; flex-direction: column;
      overflow: hidden;
      transition: width 0.3s var(--ease);
    }
    .list-panel.detail-open { width: 46%; min-width: 380px; }

    /* Topbar */
    .topbar {
      height: 62px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px;
      background: var(--card);
      border-bottom: 1px solid var(--b3);
      flex-shrink: 0;
    }

    .topbar-left { display: flex; align-items: center; gap: 10px; }

    .topbar-title {
      font-size: 19px; font-weight: 800;
      color: var(--t1); letter-spacing: -0.3px;
    }

    .active-pill {
      display: inline-flex; align-items: center; gap: 5px;
      background: var(--accent-light);
      color: var(--accent);
      font-size: 12px; font-weight: 600;
      padding: 3px 10px;
      border-radius: var(--r-pill);
    }
    .active-dot {
      width: 6px; height: 6px;
      border-radius: 50%; background: var(--accent);
    }

    .search-wrap {
      display: flex; align-items: center; gap: 8px;
      background: var(--b2);
      border-radius: var(--r-lg);
      padding: 7px 12px;
      width: 240px;
      border: 1px solid var(--b3);
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .search-wrap:focus-within {
      border-color: var(--accent-dim);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.08);
    }
    .search-wrap svg {
      width: 14px; height: 14px;
      stroke: var(--t4); fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
      flex-shrink: 0;
    }
    .search-wrap input {
      border: none; background: transparent; outline: none;
      font-size: 13px; color: var(--t1); font-family: inherit; width: 100%;
    }
    .search-wrap input::placeholder { color: var(--t4); }

    /* Toolbar */
    .toolbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; height: 46px;
      background: var(--canvas);
      border-bottom: 1px solid var(--b3);
      flex-shrink: 0;
    }

    .tabs { display: flex; align-items: center; gap: 3px; }

    .tab {
      display: flex; align-items: center; gap: 5px;
      padding: 5px 12px;
      border-radius: var(--r-md);
      font-size: 13px; font-weight: 600;
      color: var(--t3);
      cursor: pointer;
      background: white;
      border: 1px solid var(--b4);
      outline: none;
      box-shadow: 0 1px 2px rgba(0,0,0,0.06);
      transition: background 0.13s, color 0.13s, border-color 0.13s;
    }
    .tab:hover { background: var(--b1); color: var(--t2); border-color: var(--t4); }
    .tab.active { background: var(--t1); color: white; border-color: var(--t1); box-shadow: none; }
    .tab-count { font-size: 11px; font-weight: 700; opacity: 0.75; }

    .sort-controls { display: flex; align-items: center; gap: 4px; }

    .sort-btn {
      display: flex; align-items: center; gap: 5px;
      padding: 5px 10px;
      border-radius: var(--r-md);
      font-size: 12px; font-weight: 600;
      color: var(--t2);
      background: transparent;
      border: 1px solid var(--b3);
      cursor: pointer;
      transition: background 0.13s, border-color 0.13s;
      font-family: inherit;
    }
    .sort-btn:hover { background: var(--b2); border-color: var(--b4); }
    .sort-btn.active {
      background: var(--accent-light);
      border-color: var(--accent-dim);
      color: var(--accent);
    }
    .sort-btn svg {
      width: 11px; height: 11px;
      stroke: currentColor; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }

    .icon-btn {
      width: 31px; height: 31px;
      border-radius: var(--r-md);
      background: transparent;
      border: 1px solid var(--b3);
      color: var(--t3);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.13s, color 0.13s;
    }
    .icon-btn:hover { background: var(--b2); color: var(--t2); }
    .icon-btn svg {
      width: 13px; height: 13px;
      stroke: currentColor; fill: none;
      stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
    }

    /* List scroll */
    .list-scroll {
      flex: 1; overflow-y: auto;
      background: var(--canvas);
      padding: 14px;
    }
    .list-scroll::-webkit-scrollbar { width: 4px; }
    .list-scroll::-webkit-scrollbar-track { background: transparent; }
    .list-scroll::-webkit-scrollbar-thumb { background: var(--b4); border-radius: 4px; }

    .list-card {
      background: var(--card);
      border-radius: var(--card-radius);
      border: 1px solid var(--b3);
      overflow: hidden;
    }

    /* Inbox rows */
    .inbox-row {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 14px 20px;
      cursor: pointer;
      transition: background 0.12s;
      border-bottom: 1px solid var(--b2);
      position: relative;
    }
    .inbox-row:last-child { border-bottom: none; }
    .inbox-row:hover { background: var(--b1); }
    .inbox-row:hover .resolve-btn { opacity: 1; }
    .inbox-row.active { background: var(--accent-light); }
    .inbox-row.active::before {
      content: '';
      position: absolute; left: 0; top: 0; bottom: 0;
      width: 3px; background: var(--accent);
    }

    .row-avatar {
      width: 38px; height: 38px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-top: 1px;
    }
    .row-avatar svg {
      width: 17px; height: 17px;
      stroke: currentColor; fill: none;
      stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
    }
    .mod-phone { background: var(--mod-phone-bg); color: var(--mod-phone-fg); }
    .mod-sms   { background: var(--mod-sms-bg);   color: var(--mod-sms-fg);   }
    .mod-email { background: var(--mod-email-bg);  color: var(--mod-email-fg); }
    .mod-chat  { background: var(--mod-chat-bg);   color: var(--mod-chat-fg);  }

    .row-body { flex: 1; min-width: 0; }

    .row-top {
      display: flex; align-items: center; gap: 6px;
      margin-bottom: 4px; flex-wrap: wrap;
    }

    .row-name { font-size: 13.5px; font-weight: 700; color: var(--t1); }
    .row-dot {
      width: 3px; height: 3px;
      border-radius: 50%; background: var(--t4); flex-shrink: 0;
    }
    .row-phone { font-size: 12.5px; color: var(--t3); }

    .row-tag {
      display: inline-flex; align-items: center;
      padding: 2px 8px;
      border-radius: var(--r-pill);
      font-size: 11px; font-weight: 600; white-space: nowrap;
    }
    .tag-res-made        { background: #F0FDF4; color: #15803D; }
    .tag-lead            { background: #EFF6FF; color: #1D4ED8; }
    .tag-incomplete-res  { background: #FFF7ED; color: #C2410C; }
    .tag-incomplete-lead { background: #FFF1F2; color: #BE123C; }

    .row-preview {
      font-size: 12.5px; color: var(--t3);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    .row-right {
      display: flex; flex-direction: column;
      align-items: flex-end; gap: 6px;
      flex-shrink: 0; min-width: 72px;
    }
    .row-time, .row-duration {
      font-size: 11px; color: var(--t4);
      font-family: 'DM Mono', monospace;
    }

    .resolve-btn {
      opacity: 0;
      padding: 4px 10px;
      border-radius: var(--r-md);
      font-size: 11.5px; font-weight: 600;
      background: var(--card); color: var(--t2);
      border: 1px solid var(--b3);
      cursor: pointer;
      transition: opacity 0.15s, background 0.13s;
      font-family: inherit; white-space: nowrap;
    }
    .resolve-btn:hover { background: var(--b2); }

    /* Footer pagination */
    .list-footer {
      height: 50px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px;
      background: var(--card);
      border-top: 1px solid var(--b3);
      flex-shrink: 0;
    }
    .showing-text { font-size: 13px; color: var(--t3); }

    .pagination { display: flex; align-items: center; gap: 2px; }
    .page-btn {
      width: 30px; height: 30px;
      border-radius: var(--r-md);
      background: transparent;
      border: 1px solid var(--b3);
      color: var(--t2); font-size: 12.5px; font-weight: 600;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.13s, border-color 0.13s, color 0.13s;
      font-family: inherit;
    }
    .page-btn:hover { background: var(--b2); border-color: var(--b4); }
    .page-btn.active { background: var(--t1); border-color: var(--t1); color: white; }
    .page-btn svg {
      width: 12px; height: 12px;
      stroke: currentColor; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }

    /* ══════════════ DETAIL PANE ══════════════ */
    .detail-pane {
      flex: 1;
      display: flex; flex-direction: column;
      background: var(--card);
      border-left: 1px solid var(--b3);
      transform: translateX(100%);
      opacity: 0;
      transition: transform 0.28s var(--ease), opacity 0.22s var(--ease);
      pointer-events: none;
      overflow: hidden;
    }
    .detail-pane.open { transform: translateX(0); opacity: 1; pointer-events: auto; }

    .detail-scroll {
      flex: 1; overflow-y: auto;
      padding: 20px 22px 0;
    }
    .detail-scroll::-webkit-scrollbar { width: 4px; }
    .detail-scroll::-webkit-scrollbar-track { background: transparent; }
    .detail-scroll::-webkit-scrollbar-thumb { background: var(--b4); border-radius: 4px; }

    /* Top bar */
    .detail-topbar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 22px;
    }
    .priority-badge {
      display: inline-flex; align-items: center;
      padding: 6px 15px; border-radius: var(--r-pill);
      font-size: 12.5px; font-weight: 700; color: white;
    }
    .priority-high { background: var(--brand-grad); }
    .priority-med  { background: linear-gradient(135deg, #38BDF8, #0EA5E9); }
    .detail-close-btn {
      width: 30px; height: 30px; border-radius: 50%;
      border: 1px solid var(--b3); background: transparent; color: var(--t3);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.13s, color 0.13s;
    }
    .detail-close-btn:hover { background: var(--b2); color: var(--t1); }
    .detail-close-btn svg {
      width: 14px; height: 14px; stroke: currentColor; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }

    /* Name as main title */
    .detail-name-title {
      font-size: 22px; font-weight: 800; color: var(--t1);
      letter-spacing: -0.4px; margin-bottom: 8px; line-height: 1.2;
    }

    /* Member tags */
    .detail-member-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
    .detail-member-tag {
      padding: 4px 13px; border-radius: var(--r-pill);
      font-size: 12px; font-weight: 600;
      border: 1.5px solid var(--b3); color: var(--t2); background: white;
    }

    /* Contact info block */
    .detail-contact-block {
      display: flex; flex-direction: column; gap: 8px;
      margin-bottom: 18px;
    }
    .contact-info-row {
      display: flex; align-items: center; gap: 10px;
      font-size: 13px; color: var(--t2);
    }
    .contact-info-row svg {
      width: 15px; height: 15px; stroke: currentColor; fill: none;
      stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
      flex-shrink: 0; color: var(--t3);
    }
    .contact-info-row.contact-info-empty {
      color: var(--t4);
    }
    .contact-info-row.contact-info-empty svg {
      color: var(--b4);
    }
    .contact-empty-label {
      font-size: 13px; color: var(--t4); font-style: italic;
    }
    .contact-meta-dot { color: var(--b4); margin: 0 2px; }
    .contact-call-row {
      border-top: 1px solid var(--b3);
      padding-top: 10px;
      margin-top: 4px;
    }
    .detail-divider { height: 1px; background: var(--b3); margin-bottom: 18px; }

    /* Guest profile card */
    .guest-card {
      border: 1.5px solid var(--accent-dim);
      border-radius: 14px; padding: 16px;
      background: var(--accent-light); margin-bottom: 20px;
    }
    .guest-card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
    .guest-card-title { font-size: 14px; font-weight: 700; color: var(--accent); flex: 1; }
    .guest-card-badge {
      padding: 3px 10px; border-radius: var(--r-pill);
      font-size: 11.5px; font-weight: 600;
      background: white; color: var(--t2); border: 1px solid var(--b3);
    }
    .guest-card-toggle {
      width: 26px; height: 26px; border-radius: 50%;
      background: white; border: 1px solid var(--b3);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--t3); flex-shrink: 0;
    }
    .guest-card-toggle svg {
      width: 12px; height: 12px; stroke: currentColor; fill: none;
      stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round;
    }
    .guest-stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
    .guest-stat {
      background: white; border-radius: 8px; padding: 10px 12px;
      border: 1px solid rgba(37,99,235,0.1);
    }
    .guest-stat-label {
      font-size: 9.5px; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--t4); margin-bottom: 4px;
    }
    .guest-stat-value { font-size: 14px; font-weight: 700; color: var(--t1); }
    .guest-prefs-label {
      font-size: 9.5px; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--t4); margin-bottom: 7px;
    }
    .guest-prefs { display: flex; gap: 6px; flex-wrap: wrap; }
    .guest-pref-pill {
      padding: 4px 11px; border-radius: var(--r-pill);
      font-size: 12px; font-weight: 500;
      background: white; color: var(--t1); border: 1px solid var(--b3);
    }

    /* Call summary */
    .call-summary { margin-bottom: 18px; }
    .call-summary-title { font-size: 15px; font-weight: 800; color: var(--t1); margin-bottom: 7px; }
    .call-summary-text { font-size: 13.5px; line-height: 1.65; color: var(--t2); }

    /* Audio player */
    .audio-player {
      background: white; border-radius: 12px; border: 1px solid var(--b3);
      padding: 13px 16px; display: flex; align-items: center; gap: 12px;
      margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .play-btn {
      width: 38px; height: 38px; border-radius: 50%;

let activeId = null;

function renderList(items) {
  document.getElementById('inboxList').innerHTML = items.map(c => `
    <div class="inbox-row ${activeId === c.id ? 'active' : ''}" data-id="${c.id}" onclick="openDetail(${c.id})">
      <div class="row-avatar mod-${c.modality}">${MOD_ICONS[c.modality]}</div>
      <div class="row-body">
        <div class="row-top">
          <span class="row-name">${c.name}</span>
          <span class="row-dot"></span>
          <span class="row-phone">${c.phone}</span>
          ${c.tag ? `<span class="row-tag tag-${c.tag}">${c.tagLabel}</span>` : ''}
        </div>
        <div class="row-preview">${c.preview}</div>
      </div>
      <div class="row-right">
        <span class="row-time">${c.time}</span>
        <span class="row-duration">${c.duration}</span>
        <button class="resolve-btn" onclick="event.stopPropagation()">Resolve</button>
      </div>
    </div>
  `).join('');
}

function buildWaveform(totalBars, playedFraction) {
  const played = Math.floor(totalBars * playedFraction);
  return Array.from({ length: totalBars }, (_, i) => {
    const x = i / totalBars;
    const shape = Math.sin(Math.PI * x) * 0.55 + 0.45;
    const h = Math.floor((shape * 0.6 + Math.random() * 0.4) * 22 + 6);
    return `<div class="wf-bar ${i < played ? 'played' : 'unplayed'}" style="height:${h}px"></div>`;
  }).join('');
}

function openDetail(id) {
  activeId = id;
  const c = conversations.find(x => x.id === id);
  if (!c) return;

  document.querySelectorAll('.inbox-row').forEach(r => {
    r.classList.toggle('active', parseInt(r.dataset.id) === id);
  });
  document.getElementById('listPanel').classList.add('detail-open');

  // Priority badge
  const priorityHTML = c.priority
    ? `<div class="priority-badge priority-${c.priority.toLowerCase()}">Priority: ${c.priority}</div>`
    : '<div></div>';

  // Member tags
  const memberTagsHTML = [
    c.memberSince ? `<span class="detail-member-tag">Member since ${c.memberSince}</span>` : '',
    c.isVIP ? `<span class="detail-member-tag">VIP</span>` : '',
  ].filter(Boolean).join('');

  // Guest profile card
  let guestCardHTML = '';
  if (c.guestProfile) {
    const gp = c.guestProfile;
    const prefsHTML = gp.preferences.map(p => `<span class="guest-pref-pill">${p}</span>`).join('');
    const birthdayCell = gp.birthday ? `
      <div class="guest-stat">
        <div class="guest-stat-label">Birthday</div>
        <div class="guest-stat-value">${gp.birthday}</div>
      </div>` : '';
    guestCardHTML = `
      <div class="guest-card">
        <div class="guest-card-header">
          <div class="guest-card-title">Guest Profile</div>
          ${c.memberSince ? '<div class="guest-card-badge">Member</div>' : ''}
          <div class="guest-card-toggle">
            <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
        </div>
        <div class="guest-stats-grid">
          <div class="guest-stat">
            <div class="guest-stat-label">Visits</div>
            <div class="guest-stat-value">${gp.visits}</div>
          </div>
          <div class="guest-stat">
            <div class="guest-stat-label">Last Visit</div>
            <div class="guest-stat-value">${gp.lastVisit}</div>
          </div>
          ${birthdayCell}
          <div class="guest-stat">
            <div class="guest-stat-label">Email</div>
            <div class="guest-stat-value" style="font-size:12px;word-break:break-all">${gp.email}</div>
          </div>
        </div>
        ${prefsHTML ? `<div class="guest-prefs-label">Preferences</div><div class="guest-prefs">${prefsHTML}</div>` : ''}
      </div>`;
  }

  // Waveform (approx 38% played)
  const waveHTML = buildWaveform(46, 0.38);

  // Transcript bubbles
  const bubblesHTML = c.transcript.map(m => `
    <div class="msg-row ${m.role}">
      <div class="msg-bubble">${m.text}</div>
    </div>
  `).join('');

  document.getElementById('detailBody').innerHTML = `
    <div class="detail-topbar">
      ${priorityHTML}
      <button class="detail-close-btn" onclick="closeDetail()">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <div class="detail-name-title">${c.name}</div>
    ${memberTagsHTML ? `<div class="detail-member-tags">${memberTagsHTML}</div>` : ''}

    <div class="detail-contact-block">
      <div class="contact-info-row ${c.phone ? '' : 'contact-info-empty'}">
        <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 11a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 0h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9a16 16 0 0 0 6.86 6.86l1.36-1.16a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        ${c.phone ? `<span>${c.phone}</span>` : `<span class="contact-empty-label">Phone not on file</span>`}
      </div>
      <div class="contact-info-row ${c.email ? '' : 'contact-info-empty'}">
        <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        ${c.email ? `<span>${c.email}</span>` : `<span class="contact-empty-label">Email not on file</span>`}
      </div>
      <div class="contact-info-row contact-call-row">
        ${MOD_ICONS[c.modality]}
        <span>${{ phone: 'Phone call', sms: 'SMS', email: 'Email', chat: 'Chat' }[c.modality]}</span>
        <span class="contact-meta-dot">·</span>
        <span style="color:var(--t3)">Today</span>
        <span class="contact-meta-dot">·</span>
        <span style="color:var(--t3)">${c.time}</span>
        <span class="contact-meta-dot">·</span>
        <span style="color:var(--t3)">${c.duration}</span>
      </div>
    </div>

    <div class="detail-divider"></div>

    ${guestCardHTML}

    <div class="call-summary">
      <div class="call-summary-title">Call Summary</div>
      <div class="call-summary-text">${c.callSummary}</div>
    </div>

    <div class="audio-player">
      <button class="play-btn">
        <svg viewBox="0 0 24 24" width="13" height="13" fill="white" stroke="none" style="margin-left:2px">
          <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
      </button>
      <div class="waveform">${waveHTML}</div>
      <div class="audio-time">1:18 / ${c.duration}</div>
    </div>

    <div class="transcript-section">
      <div class="transcript-label">Transcript</div>
      ${bubblesHTML}
    </div>
  `;

  document.getElementById('detailFooter').innerHTML = `
    <button class="resolve-btn-main" onclick="closeDetail()">Mark as Resolved</button>
  `;

  requestAnimationFrame(() => {
    document.getElementById('detailPane').classList.add('open');
  });
}

function closeDetail() {
  activeId = null;
  document.getElementById('detailPane').classList.remove('open');
  document.getElementById('detailFooter').innerHTML = '';
  document.getElementById('listPanel').classList.remove('detail-open');
  document.querySelectorAll('.inbox-row').forEach(r => r.classList.remove('active'));
}

let currentFilter = 'inbox';

function getFiltered(query) {
  let items = currentFilter === 'all'
    ? conversations
    : conversations.filter(c => c.status === currentFilter);
  if (query) {
    const q = query.toLowerCase();
    items = items.filter(c =>
      c.name.toLowerCase().includes(q) ||
      c.preview.toLowerCase().includes(q) ||
      c.phone.includes(q)
    );
  }
  return items;
}

function updateFooter(total) {
  const per = 20;
  const pages = Math.max(1, Math.ceil(total / per));
  const end = Math.min(per, total);
  const start = total === 0 ? 0 : 1;
  document.getElementById('showingText').innerHTML =
    `Showing <strong>${start}–${end}</strong> of <strong>${total}</strong> call${total !== 1 ? 's' : ''}`;
  let html = `<button class="page-btn"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>`;
  for (let i = 1; i <= Math.min(pages, 5); i++) {
    html += `<button class="page-btn ${i === 1 ? 'active' : ''}">${i}</button>`;
  }
  html += `<button class="page-btn"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></button>`;
  document.getElementById('pagination').innerHTML = html;
}

function switchTab(el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  currentFilter = el.dataset.filter;
  closeDetail();
  const filtered = getFiltered(document.getElementById('searchInput').value);
  renderList(filtered);
  updateFooter(filtered.length);
}

document.getElementById('searchInput').addEventListener('input', e => {
  const filtered = getFiltered(e.target.value);
  renderList(filtered);
  updateFooter(filtered.length);
});

const initialItems = getFiltered('');
renderList(initialItems);
updateFooter(initialItems.length);
</script>
